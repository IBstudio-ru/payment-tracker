<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мониторинг оплат v5</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #f8f9fa; color: #202124; line-height: 1.4; }
  
  header { background: #fff; border-bottom: 1px solid #dadce0; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 500; color: #3c4043; }
  .status-pill { font-size: 11px; padding: 4px 12px; border-radius: 16px; background: #f1f3f4; color: #5f6368; font-weight: 500; transition: 0.3s; }
  .status-pill.syncing { background: #fef7e0; color: #ea8600; }
  .status-pill.ready { background: #e6f4ea; color: #1e8e3e; }

  .toolbar { background: #fff; padding: 12px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 12px; align-items: center; }
  .search-input { flex: 1; padding: 8px 12px; border: 1px solid #dadce0; border-radius: 8px; outline: none; }
  .search-input:focus { border-color: #1a73e8; }

  .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-outline { background: #fff; border: 1px solid #dadce0; color: #3c4043; }
  .btn-danger { color: #d93025; background: none; font-size: 16px; }

  .metrics-bar { display: flex; gap: 16px; padding: 16px 20px; }
  .metric-card { background: #fff; border: 1px solid #dadce0; border-radius: 12px; padding: 16px; min-width: 240px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .metric-label { font-size: 11px; color: #70757a; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; }
  .metric-value { font-size: 24px; font-weight: 700; color: #1a73e8; }

  .content { padding: 0 20px 40px; }
  .table-container { background: #fff; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { background: #f8f9fa; padding: 12px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #5f6368; border-bottom: 1px solid #dadce0; }
  td { padding: 12px 10px; border-bottom: 1px solid #f1f3f4; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tr:hover td { background: #f8f9ff; }

  .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-paid { background: #e6f4ea; color: #1e8e3e; }
  .badge-unpaid { background: #fce8e6; color: #d93025; }
  .badge-part { background: #fef7e0; color: #ea8600; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(32,33,36,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 550px; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 15px; }
  .full-width { grid-column: 1 / -1; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 11px; font-weight: 600; color: #5f6368; }
  .input-group input, .input-group select { padding: 9px; border: 1px solid #dadce0; border-radius: 8px; outline: none; font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>📊 Мониторинг оплат</h1>
  <div id="sync-status" class="status-pill">Загрузка...</div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" class="search-input" placeholder="Поиск по клиенту или названию..." oninput="updateUI()">
  <select id="statusFilter" onchange="updateUI()">
    <option value="">Все статусы</option>
    <option value="Оплачено">Оплачено</option>
    <option value="Не оплачено">Не оплачено</option>
    <option value="Частично">Частично</option>
  </select>
  <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
  <button class="btn btn-outline" onclick="loadData()">Обновить</button>
</div>

<div class="metrics-bar">
  <div class="metric-card">
    <div class="metric-label">Общая сумма бюджета</div>
    <div class="metric-value" id="total-amount">0 ₽</div>
  </div>
</div>

<div class="content">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th style="width: 20%">Клиент</th>
          <th style="width: 25%">Название</th>
          <th style="width: 12%; text-align:center">Ссылки</th>
          <th style="width: 15%">Сумма</th>
          <th style="width: 15%">Статус</th>
          <th style="width: 13%">Действия</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" style="text-align:center; padding:40px; color:#999">Инициализация...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <h2 id="modalTitle">Новая запись</h2>
    <div class="form-grid">
      <div class="input-group full-width"><label>Клиент *</label><input type="text" id="f-client"></div>
      <div class="input-group full-width"><label>Название (Тема)</label><input type="text" id="f-title"></div>
      <div class="input-group"><label>Категория</label><input type="text" id="f-category"></div>
      <div class="input-group"><label>Статус</label>
        <select id="f-status">
          <option>Не оплачено</option>
          <option>Оплачено</option>
          <option>Частично</option>
        </select>
      </div>
      <div class="input-group"><label>Сумма бюджета (₽)</label><input type="number" id="f-amount"></div>
      <div class="input-group"><label>Дата оплаты</label><input type="date" id="f-date"></div>
      <div class="input-group full-width"><label>Ссылка на статью</label><input type="text" id="f-article"></div>
      <div class="input-group full-width"><label>Ссылка на задачу</label><input type="text" id="f-task"></div>
    </div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px;">
      <button class="btn btn-outline" id="btn-close" onclick="closeModal()">Отмена</button>
      <button class="btn btn-outline" id="btn-save-more" onclick="saveData(true)">Еще строку</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveData(false)">Сохранить</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxJtyM1MsIVzCmfBZNm9s9i89TqiXkVAc4bCAI13U95AFu1g5zL0XXtHrXpkogYAx4/exec';
let rawData = [];
let currentEditId = null;

async function loadData() {
  updateStatus('syncing', 'Обновление...');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll', { redirect: 'follow' });
    const json = await res.json();
    rawData = json.rows || [];
    updateStatus('ready', 'Готово');
    updateUI();
  } catch (e) {
    updateStatus('error', 'Ошибка связи');
  }
}

function updateUI() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('statusFilter').value;
  
  const filtered = rawData.filter(r => {
    const client = (r['Клиент'] || '').toLowerCase();
    const title = (r['Название'] || '').toLowerCase();
    return (client.includes(q) || title.includes(q)) && (!st || r['Статус'] === st);
  });

  const total = filtered.reduce((s, r) => s + (Number(r['Сумма бюджета']) || 0), 0);
  document.getElementById('total-amount').textContent = total.toLocaleString('ru-RU') + ' ₽';

  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:#999">Записей нет</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td style="font-weight:500">${r['Клиент'] || '—'}</td>
      <td>${r['Название'] || '—'}</td>
      <td style="text-align:center">
        ${r['Ссылка на статью'] ? `<a href="${r['Ссылка на статью']}" target="_blank" title="Статья" style="text-decoration:none">📄</a>` : ''}
        ${r['Ссылка на задачу'] ? `<a href="${r['Ссылка на задачу']}" target="_blank" title="Задача" style="text-decoration:none">✅</a>` : ''}
      </td>
      <td style="font-weight:600">${(Number(r['Сумма бюджета']) || 0).toLocaleString('ru-RU')} ₽</td>
      <td><span class="badge ${r['Статус'] === 'Оплачено' ? 'badge-paid' : r['Статус'] === 'Частично' ? 'badge-part' : 'badge-unpaid'}">${r['Статус'] || 'Не оплачено'}</span></td>
      <td style="text-align:right">
        <button class="btn btn-outline" style="padding:4px 8px" onclick="openModal('${r.id}')">✏️</button>
        <button class="btn btn-danger" style="padding:4px 8px" onclick="deleteRow('${r.id}')">🗑</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id = null) {
  currentEditId = id;
  const r = rawData.find(x => x.id == id) || {};
  document.getElementById('modalTitle').textContent = id ? 'Редактировать' : 'Новая запись';
  document.getElementById('f-client').value = r['Клиент'] || '';
  document.getElementById('f-title').value = r['Название'] || '';
  document.getElementById('f-category').value = r['Категория'] || '';
  document.getElementById('f-status').value = r['Статус'] || 'Не оплачено';
  document.getElementById('f-amount').value = r['Сумма бюджета'] || '';
  document.getElementById('f-article').value = r['Ссылка на статью'] || '';
  document.getElementById('f-task').value = r['Ссылка на задачу'] || '';
  
  if (r['Дата оплаты бюджета']) {
    try {
      document.getElementById('f-date').value = new Date(r['Дата оплаты бюджета']).toISOString().split('T')[0];
    } catch(e) { document.getElementById('f-date').value = ''; }
  } else {
    document.getElementById('f-date').value = '';
  }
  
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveData(keepOpen) {
  const btn = document.getElementById(keepOpen ? 'btn-save-more' : 'btn-save');
  const originalText = btn.textContent;
  
  btn.disabled = true;
  btn.textContent = '⏱...';
  updateStatus('syncing', 'Сохранение...');

  const payload = {
    id: currentEditId || '',
    'Клиент': document.getElementById('f-client').value,
    'Название': document.getElementById('f-title').value,
    'Категория': document.getElementById('f-category').value,
    'Статус': document.getElementById('f-status').value,
    'Сумма бюджета': document.getElementById('f-amount').value,
    'Ссылка на статью': document.getElementById('f-article').value,
    'Ссылка на задачу': document.getElementById('f-task').value,
    'Дата оплаты бюджета': document.getElementById('f-date').value
  };

  try {
    await fetch(SCRIPT_URL + '?action=save&row=' + encodeURIComponent(JSON.stringify(payload)), { redirect: 'follow' });
    await loadData();
    if (keepOpen) {
      currentEditId = null;
      document.getElementById('f-title').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-title').focus();
    } else {
      closeModal();
    }
  } catch (e) {
    alert('Ошибка при сохранении');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

async function deleteRow(id) {
  if (!confirm('Удалить эту запись?')) return;
  updateStatus('syncing', 'Удаление...');
  try {
    await fetch(SCRIPT_URL + '?action=delete&id=' + id, { redirect: 'follow' });
    await loadData();
  } catch (e) {
    alert('Ошибка при удалении');
    updateStatus('ready', 'Готово');
  }
}

function updateStatus(cls, text) {
  const el = document.getElementById('sync-status');
  el.className = 'status-pill ' + cls;
  el.textContent = text;
}

loadData();
</script>
</body>
</html>
