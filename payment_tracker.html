<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система учёта оплат</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #f8f9fa; color: #202124; }
  
  /* Шапка и Статус */
  header { background: #fff; border-bottom: 1px solid #dadce0; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 500; color: #3c4043; }
  .status-pill { font-size: 11px; padding: 4px 12px; border-radius: 16px; background: #e8f0fe; color: #1967d2; font-weight: 500; }
  .status-pill.syncing { background: #fef7e0; color: #ea8600; }
  .status-pill.error { background: #fce8e6; color: #d93025; }

  /* Панель инструментов */
  .toolbar { background: #fff; padding: 12px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #dadce0; border-radius: 8px; outline: none; }
  .search-input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }
  select { padding: 8px; border: 1px solid #dadce0; border-radius: 8px; background: #fff; cursor: pointer; }

  /* Кнопки */
  .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover { background: #1765cc; }
  .btn-outline { background: #fff; border: 1px solid #dadce0; color: #3c4043; }
  .btn-outline:hover { background: #f1f3f4; }

  /* Метрики (Сумма) */
  .metrics-bar { display: flex; gap: 16px; padding: 16px 20px; }
  .metric-card { background: #fff; border: 1px solid #dadce0; border-radius: 12px; padding: 16px; flex: 1; max-width: 250px; }
  .metric-label { font-size: 11px; color: #70757a; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
  .metric-value { font-size: 22px; font-weight: 700; color: #1a73e8; }

  /* Таблица */
  .content { padding: 0 20px 40px; }
  .table-container { background: #fff; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { background: #f8f9fa; padding: 12px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #5f6368; border-bottom: 1px solid #dadce0; }
  td { padding: 12px 10px; border-bottom: 1px solid #f1f3f4; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tr:hover td { background: #fdfdfd; }

  /* Статусы-бейджы */
  .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-paid { background: #e6f4ea; color: #1e8e3e; }
  .badge-unpaid { background: #fce8e6; color: #d93025; }
  .badge-part { background: #fef7e0; color: #ea8600; }

  /* Модальное окно */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(32,33,36,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 550px; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .full-width { grid-column: 1 / -1; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 11px; font-weight: 600; color: #5f6368; }
  .input-group input, .input-group select { padding: 10px; border: 1px solid #dadce0; border-radius: 8px; outline: none; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }

  .empty-state { text-align: center; padding: 60px; color: #70757a; }
</style>
</head>
<body>

<header>
  <h1>📊 Мониторинг оплат</h1>
  <div id="sync-status" class="status-pill">Проверка связи...</div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" class="search-input" placeholder="Поиск по клиенту или теме..." oninput="updateUI()">
  <select id="statusFilter" onchange="updateUI()">
    <option value="">Все статусы</option>
    <option value="Оплачено">Оплачено</option>
    <option value="Не оплачено">Не оплачено</option>
    <option value="Частично">Частично</option>
  </select>
  <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
  <button class="btn btn-outline" onclick="loadData()">Обновить</button>
</div>

<div class="metrics-bar">
  <div class="metric-card">
    <div class="metric-label">Общая сумма бюджета</div>
    <div class="metric-value" id="total-amount">0 ₽</div>
  </div>
</div>

<div class="content">
  <div class="table-container">
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width: 20%">Клиент</th>
          <th style="width: 25%">Название (Тема)</th>
          <th style="width: 15%">Категория</th>
          <th style="width: 15%">Сумма</th>
          <th style="width: 15%">Статус</th>
          <th style="width: 10%"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="empty-state">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <h2 id="modalTitle">Новая запись</h2>
    <div class="form-grid">
      <div class="input-group full-width"><label>Клиент *</label><input type="text" id="f-client" placeholder="Название компании"></div>
      <div class="input-group full-width"><label>Тема / Проект</label><input type="text" id="f-title" placeholder="О чем проект?"></div>
      <div class="input-group"><label>Категория</label><input type="text" id="f-category" placeholder="SEO, Контекст..."></div>
      <div class="input-group"><label>Статус</label>
        <select id="f-status">
          <option>Не оплачено</option>
          <option>Оплачено</option>
          <option>Частично</option>
        </select>
      </div>
      <div class="input-group"><label>Бюджет (₽)</label><input type="number" id="f-amount" placeholder="0"></div>
      <div class="input-group"><label>Дата оплаты</label><input type="date" id="f-date"></div>
      <div class="input-group full-width"><label>Ссылка на задачу</label><input type="text" id="f-task" placeholder="Битрикс / Notion"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-outline" onclick="saveData(true)">Еще строку</button>
      <button class="btn btn-primary" onclick="saveData(false)">Сохранить</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxJtyM1MsIVzCmfBZNm9s9i89TqiXkVAc4bCAI13U95AFu1g5zL0XXtHrXpkogYAx4/exec';
let rawData = [];
let currentEditId = null;

async function loadData() {
  updateStatus('syncing', 'Синхронизация...');
  try {
    const response = await fetch(SCRIPT_URL + '?action=getAll', { redirect: 'follow' });
    const json = await response.json();
    rawData = json.rows || [];
    updateStatus('ok', 'Данные обновлены');
    updateUI();
  } catch (e) {
    updateStatus('error', 'Ошибка связи');
  }
}

function updateUI() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const filterStatus = document.getElementById('statusFilter').value;
  
  const filtered = rawData.filter(row => {
    const matchesSearch = row['Клиент']?.toLowerCase().includes(searchTerm) || row['Название']?.toLowerCase().includes(searchTerm);
    const matchesStatus = !filterStatus || row['Статус'] === filterStatus;
    return matchesSearch && matchesStatus;
  });

  // Обновляем общую сумму
  const total = filtered.reduce((sum, row) => sum + (Number(row['Сумма бюджета']) || 0), 0);
  document.getElementById('total-amount').textContent = total.toLocaleString('ru-RU') + ' ₽';

  // Рендерим таблицу
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет данных для отображения</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(row => `
    <tr>
      <td style="font-weight:500">${row['Клиент'] || '—'}</td>
      <td>${row['Название'] || '—'}</td>
      <td><span style="color:#70757a">${row['Категория'] || '—'}</span></td>
      <td style="font-weight:600">${(Number(row['Сумма бюджета']) || 0).toLocaleString('ru-RU')} ₽</td>
      <td><span class="badge ${getStatusClass(row['Статус'])}">${row['Статус'] || 'Не оплачено'}</span></td>
      <td style="text-align:right">
        <button class="btn btn-outline" style="padding:4px 8px" onclick="openModal('${row.id}')">✏️</button>
      </td>
    </tr>
  `).join('');
}

function getStatusClass(s) {
  if (s === 'Оплачено') return 'badge-paid';
  if (s === 'Частично') return 'badge-part';
  return 'badge-unpaid';
}

function openModal(id = null) {
  currentEditId = id;
  const row = rawData.find(r => r.id == id) || {};
  document.getElementById('modalTitle').textContent = id ? 'Редактировать запись' : 'Новая запись';
  document.getElementById('f-client').value = row['Клиент'] || '';
  document.getElementById('f-title').value = row['Название'] || '';
  document.getElementById('f-category').value = row['Категория'] || '';
  document.getElementById('f-status').value = row['Статус'] || 'Не оплачено';
  document.getElementById('f-amount').value = row['Сумма бюджета'] || '';
  document.getElementById('f-task').value = row['Ссылка на задачу'] || '';
  document.getElementById('f-date').value = row['Дата оплаты бюджета'] ? new Date(row['Дата оплаты бюджета']).toISOString().split('T')[0] : '';
  
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveData(keepOpen) {
  const payload = {
    id: currentEditId || '',
    'Клиент': document.getElementById('f-client').value,
    'Название': document.getElementById('f-title').value,
    'Категория': document.getElementById('f-category').value,
    'Статус': document.getElementById('f-status').value,
    'Сумма бюджета': document.getElementById('f-amount').value,
    'Ссылка на задачу': document.getElementById('f-task').value,
    'Дата оплаты бюджета': document.getElementById('f-date').value
  };

  updateStatus('syncing', 'Сохранение...');
  try {
    await fetch(SCRIPT_URL + '?action=save&row=' + encodeURIComponent(JSON.stringify(payload)), { redirect: 'follow' });
    await loadData();
    if (keepOpen) {
      currentEditId = null;
      document.getElementById('f-title').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-title').focus();
    } else {
      closeModal();
    }
  } catch (e) {
    alert('Ошибка при сохранении');
    updateStatus('error', 'Ошибка записи');
  }
}

function updateStatus(cls, text) {
  const el = document.getElementById('sync-status');
  el.className = 'status-pill ' + cls;
  el.textContent = text;
}

loadData();
</script>
</body>
</html>
