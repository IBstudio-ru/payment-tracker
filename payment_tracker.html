<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мониторинг оплат v8</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; background: #f8f9fa; color: #202124; line-height: 1.4; }
  
  header { background: #fff; border-bottom: 1px solid #dadce0; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 500; }
  .status-pill { font-size: 11px; padding: 4px 12px; border-radius: 16px; background: #f1f3f4; color: #5f6368; }

  .toolbar { background: #fff; padding: 12px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 12px; align-items: center; }
  .search-input { flex: 1; padding: 8px 12px; border: 1px solid #dadce0; border-radius: 8px; outline: none; }

  .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-outline { background: #fff; border: 1px solid #dadce0; color: #3c4043; }
  
  .metrics-bar { display: flex; gap: 16px; padding: 16px 20px; }
  .metric-card { background: #fff; border: 1px solid #dadce0; border-radius: 12px; padding: 16px; min-width: 220px; }
  .metric-label { font-size: 11px; color: #70757a; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
  .metric-value { font-size: 24px; font-weight: 700; color: #1a73e8; }

  .content { padding: 0 20px 40px; }
  .table-container { background: #fff; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { background: #f8f9fa; padding: 12px 10px; text-align: left; font-size: 11px; color: #5f6368; border-bottom: 1px solid #dadce0; }
  td { padding: 12px 10px; border-bottom: 1px solid #f1f3f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tr:hover td { background: #f8f9ff; }

  .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-paid { background: #e6f4ea; color: #1e8e3e; }
  .badge-unpaid { background: #fce8e6; color: #d93025; }
  .badge-part { background: #fef7e0; color: #ea8600; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(32,33,36,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 550px; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 15px; }
  .full { grid-column: 1 / -1; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 11px; font-weight: 600; color: #5f6368; }
  .input-group input, .input-group select { padding: 9px; border: 1px solid #dadce0; border-radius: 8px; outline: none; }
</style>
</head>
<body>

<header>
  <h1>📊 Мониторинг оплат</h1>
  <div id="sync-status" class="status-pill">Загрузка...</div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" class="search-input" placeholder="Поиск по клиенту или названию..." oninput="render()">
  <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
  <button class="btn btn-outline" onclick="loadData()">↻</button>
</div>

<div class="metrics-bar">
  <div class="metric-card">
    <div class="metric-label">Сумма по списку</div>
    <div class="metric-value" id="total-amount">0 ₽</div>
  </div>
</div>

<div class="content">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th style="width: 18%">Клиент</th>
          <th style="width: 22%">Название</th>
          <th style="width: 10%">Категория</th>
          <th style="width: 8%; text-align:center">Ссылки</th>
          <th style="width: 12%">Оплата</th>
          <th style="width: 12%">Сумма</th>
          <th style="width: 12%">Статус</th>
          <th style="width: 6%"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">Новая запись</h2>
    <div class="form-grid">
      <div class="input-group full"><label>Клиент *</label><input type="text" id="f-client"></div>
      <div class="input-group full"><label>Название (Тема)</label><input type="text" id="f-title"></div>
      <div class="input-group"><label>Категория</label><input type="text" id="f-category"></div>
      <div class="input-group"><label>Статус</label>
        <select id="f-status">
          <option>Не оплачено</option>
          <option>Оплачено</option>
          <option>Частично</option>
        </select>
      </div>
      <div class="input-group"><label>Бюджет (₽)</label><input type="number" id="f-amount"></div>
      <div class="input-group"><label>Дата оплаты</label><input type="date" id="f-date"></div>
      <div class="input-group full"><label>Ссылка на задачу</label><input type="text" id="f-task"></div>
      <div class="input-group full"><label>Ссылка на статью</label><input type="text" id="f-article"></div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px;">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveData()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxJtyM1MsIVzCmfBZNm9s9i89TqiXkVAc4bCAI13U95AFu1g5zL0XXtHrXpkogYAx4/exec';
let rawData = [];
let currentId = null;

async function loadData() {
  document.getElementById('sync-status').textContent = 'Обновление...';
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll', { redirect: 'follow' });
    const json = await res.json();
    rawData = Array.isArray(json.rows) ? json.rows : [];
    render();
    document.getElementById('sync-status').textContent = 'Данные обновлены';
  } catch (e) {
    document.getElementById('sync-status').textContent = 'Ошибка связи';
  }
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = rawData.filter(r => JSON.stringify(r).toLowerCase().includes(q));
  
  const total = filtered.reduce((s, r) => s + (Number(r['Сумма бюджета']) || 0), 0);
  document.getElementById('total-amount').textContent = total.toLocaleString('ru-RU') + ' ₽';

  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#999">Записей нет</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td><b>${r['Клиент'] || ''}</b></td>
      <td title="${r['Название'] || ''}">${r['Название'] || '—'}</td>
      <td style="color:#666">${r['Категория'] || '—'}</td>
      <td style="text-align:center">
        ${r['Ссылка на статью'] ? `<a href="${r['Ссылка на статью']}" target="_blank" style="text-decoration:none" title="Статья">📄</a>` : ''}
        ${r['Ссылка на задачу'] ? `<a href="${r['Ссылка на задачу']}" target="_blank" style="text-decoration:none" title="Задача">✅</a>` : ''}
      </td>
      <td>${r['Дата оплаты бюджета'] ? new Date(r['Дата оплаты бюджета']).toLocaleDateString('ru') : '—'}</td>
      <td style="font-weight:600">${(Number(r['Сумма бюджета']) || 0).toLocaleString('ru-RU')} ₽</td>
      <td><span class="badge ${r['Статус'] === 'Оплачено' ? 'badge-paid' : r['Статус'] === 'Частично' ? 'badge-part' : 'badge-unpaid'}">${r['Статус'] || ''}</span></td>
      <td style="text-align:right">
        <button style="background:none; border:none; cursor:pointer;" onclick="openModal('${r.id}')">✏️</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id = null) {
  currentId = id;
  const r = id ? rawData.find(x => String(x.id) === String(id)) : {};
  
  document.getElementById('modalTitle').textContent = id ? 'Редактировать' : 'Новая запись';
  document.getElementById('f-client').value = r['Клиент'] || '';
  document.getElementById('f-title').value = r['Название'] || '';
  document.getElementById('f-category').value = r['Категория'] || '';
  document.getElementById('f-status').value = r['Статус'] || 'Не оплачено';
  document.getElementById('f-amount').value = r['Сумма бюджета'] || '';
  document.getElementById('f-task').value = r['Ссылка на задачу'] || '';
  document.getElementById('f-article').value = r['Ссылка на статью'] || '';
  
  if (r['Дата оплаты бюджета']) {
    try {
      const d = new Date(r['Дата оплаты бюджета']);
      document.getElementById('f-date').value = d.toISOString().split('T')[0];
    } catch(e) { document.getElementById('f-date').value = ''; }
  } else {
    document.getElementById('f-date').value = '';
  }
  
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function saveData() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏱...';

  const payload = {
    id: currentId || '',
    'Клиент': document.getElementById('f-client').value,
    'Название': document.getElementById('f-title').value,
    'Категория': document.getElementById('f-category').value,
    'Статус': document.getElementById('f-status').value,
    'Сумма бюджета': document.getElementById('f-amount').value,
    'Ссылка на задачу': document.getElementById('f-task').value,
    'Ссылка на статью': document.getElementById('f-article').value,
    'Дата оплаты бюджета': document.getElementById('f-date').value
  };

  try {
    await fetch(SCRIPT_URL + '?action=save&row=' + encodeURIComponent(JSON.stringify(payload)), { redirect: 'follow' });
    await loadData();
    closeModal();
  } catch (e) { alert('Ошибка сохранения'); }
  finally { btn.disabled = false; btn.textContent = 'Сохранить'; }
}

loadData();
</script>
</body>
</html>
