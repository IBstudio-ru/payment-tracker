<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт оплат клиентов</title>
<style>
  /* ── Вставьте ваш URL Google Apps Script сюда ── */
  :root { --script-url: ''; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #f5f5f5; color: #1a1a1a; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .save-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
  .save-badge.saving { background: #fff8e1; color: #f57f17; }
  .save-badge.error { background: #ffebee; color: #c62828; }

  .toolbar { display: flex; gap: 8px; align-items: center; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
  .toolbar input[type=text]:focus { border-color: #4285f4; }
  select { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 13px; background: #fff; outline: none; cursor: pointer; }
  .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-blue { background: #4285f4; color: #fff; }
  .btn-blue:hover { background: #3367d6; }
  .btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
  .btn-outline:hover { background: #f5f5f5; }

  .main { padding: 16px 20px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .metric { background: #fff; border-radius: 8px; padding: 12px 16px; border: 1px solid #e8e8e8; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-value.green { color: #2e7d32; }
  .metric-value.amber { color: #f57f17; }
  .metric-value.blue { color: #1565c0; }

  .table-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 980px; table-layout: fixed; }
  thead { background: #fafafa; }
  th { padding: 9px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #555; border-bottom: 1px solid #e8e8e8; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #4285f4; }
  th.sorted { color: #4285f4; }
  td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }
  .link-btn { color: #4285f4; text-decoration: none; font-size: 11px; }
  .link-btn:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-paid { background: #e8f5e9; color: #2e7d32; }
  .badge-unpaid { background: #ffebee; color: #c62828; }
  .badge-partial { background: #fff8e1; color: #f57f17; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; border-radius: 4px; font-size: 14px; }
  .icon-btn:hover { background: #f0f0f0; }
  .icon-btn.del:hover { background: #ffebee; }
  .empty { text-align: center; padding: 40px; color: #aaa; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 40px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 24px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .fg { display: flex; flex-direction: column; gap: 4px; }
  .fg.full { grid-column: 1/-1; }
  .fg label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.3px; }
  .fg input, .fg select { border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
  .fg input:focus, .fg select:focus { border-color: #4285f4; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #4285f4; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Настройки URL */
  .setup-bar { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .setup-bar span { font-size: 13px; color: #856404; flex: 1; min-width: 200px; }
  .setup-bar input { flex: 2; min-width: 260px; border: 1px solid #ffc107; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; }
  .setup-bar input:focus { border-color: #4285f4; }
</style>
</head>
<body>

<header>
  <h1>📊 Учёт оплат клиентов</h1>
  <span class="save-badge" id="save-badge">● Загрузка...</span>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 Поиск по клиенту или категории..." oninput="render()">
  <select id="filter-status" onchange="render()">
    <option value="">Все статусы</option>
    <option value="Оплачено">Оплачено</option>
    <option value="Не оплачено">Не оплачено</option>
    <option value="Частично">Частично</option>
  </select>
  <button class="btn btn-blue" onclick="openModal()">+ Добавить клиента</button>
  <button class="btn btn-outline" onclick="loadData()">↻ Обновить</button>
  <button class="btn btn-outline" onclick="exportCSV()">↓ Экспорт CSV</button>
</div>

<div class="main">

  <div class="setup-bar" id="setup-bar" style="display:none">
    <span>⚙️ Укажите URL вашего Google Apps Script:</span>
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="btn btn-blue" onclick="saveScriptUrl()">Сохранить</button>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:125px" onclick="sortBy('client')">Клиент <span id="s-client"></span></th>
            <th style="width:95px" onclick="sortBy('category')">Категория <span id="s-category"></span></th>
            <th style="width:72px">Статья</th>
            <th style="width:72px">Задача</th>
            <th style="width:90px" onclick="sortBy('launch')">Первый запуск <span id="s-launch"></span></th>
            <th style="width:90px" onclick="sortBy('payWork')">Опл. работы <span id="s-payWork"></span></th>
            <th style="width:80px" onclick="sortBy('workAmt')">Сумма работы <span id="s-workAmt"></span></th>
            <th style="width:90px" onclick="sortBy('payBudget')">Опл. бюджета <span id="s-payBudget"></span></th>
            <th style="width:80px" onclick="sortBy('budgetAmt')">Сумма бюджета <span id="s-budgetAmt"></span></th>
            <th style="width:90px">Статус</th>
            <th style="width:56px"></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="11" class="empty"><span class="spinner"></span> Загрузка данных...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Модалка -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <h2 id="modal-title">Новый клиент</h2>
    <div class="form-grid">
      <div class="fg full"><label>Клиент *</label><input id="f-client" placeholder="Название компании или ИП"></div>
      <div class="fg"><label>Категория</label><input id="f-category" placeholder="SEO, SMM, Контекст..."></div>
      <div class="fg"><label>Статус</label>
        <select id="f-status">
          <option>Не оплачено</option>
          <option>Оплачено</option>
          <option>Частично</option>
        </select>
      </div>
      <div class="fg full"><label>Ссылка на статью</label><input id="f-article" placeholder="https://..."></div>
      <div class="fg full"><label>Ссылка на задачу в Битрикс24</label><input id="f-task" placeholder="https://ваш-портал.bitrix24.ru/tasks/task/view/..."></div>
      <div class="fg"><label>Первый запуск</label><input type="date" id="f-launch"></div>
      <div class="fg"></div>
      <div class="fg"><label>Дата оплаты работы</label><input type="date" id="f-paywork"></div>
      <div class="fg"><label>Сумма работы (₽)</label><input type="number" id="f-workamt" placeholder="0" min="0"></div>
      <div class="fg"><label>Дата оплаты бюджета</label><input type="date" id="f-paybudget"></div>
      <div class="fg"><label>Сумма бюджета (₽)</label><input type="number" id="f-budgetamt" placeholder="0" min="0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-blue" id="save-btn" onclick="saveRow()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// КОНФИГУРАЦИЯ — вставьте ваш URL Apps Script здесь:
// ═══════════════════════════════════════════════════
let SCRIPT_URL = localStorage.getItem('payment_tracker_script_url') || https://script.google.com/macros/s/AKfycbzxJtyM1MsIVzCmfBZNm9s9i89TqiXkVAc4bCAI13U95AFu1g5zL0XXtHrXpkogYAx4/exec;

let data = [];
let sortCol = null, sortDir = 1;
let editId = null;

// ── Инициализация ──
window.addEventListener('DOMContentLoaded', () => {
  if (!SCRIPT_URL) {
    document.getElementById('setup-bar').style.display = 'flex';
    setBadge('error', '⚠ Нет URL скрипта');
    document.getElementById('table-body').innerHTML = '<tr><td colspan="11" class="empty">Укажите URL Google Apps Script выше</td></tr>';
  } else {
    loadData();
  }
});

function saveScriptUrl() {
  const val = document.getElementById('script-url-input').value.trim();
  if (!val.startsWith('https://script.google.com')) {
    alert('Введите корректный URL вида https://script.google.com/macros/s/.../exec');
    return;
  }
  SCRIPT_URL = val;
  localStorage.setItem('payment_tracker_script_url', val);
  document.getElementById('setup-bar').style.display = 'none';
  loadData();
}

// ── API ──
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadData() {
  setBadge('saving', '⟳ Загрузка...');
  try {
    const result = await api({ action: 'getAll' });
    data = result.rows || [];
    setBadge('ok', '● Данные загружены');
    render();
  } catch(e) {
    setBadge('error', '⚠ Ошибка загрузки');
    document.getElementById('table-body').innerHTML = `<tr><td colspan="11" class="empty">Ошибка: ${e.message}</td></tr>`;
  }
}

// ── Сортировка ──
function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  ['client','category','launch','payWork','workAmt','payBudget','budgetAmt'].forEach(c => {
    const el = document.getElementById('s-' + c);
    if (el) { el.textContent = ''; el.closest('th').classList.remove('sorted'); }
  });
  const el = document.getElementById('s-' + col);
  if (el) { el.textContent = sortDir === 1 ? ' ↑' : ' ↓'; el.closest('th').classList.add('sorted'); }
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  let rows = data.filter(r =>
    (!q || String(r.client||'').toLowerCase().includes(q) || String(r.category||'').toLowerCase().includes(q)) &&
    (!st || r.status === st)
  );
  if (sortCol) {
    rows.sort((a, b) => {
      let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      if (!isNaN(av) && !isNaN(bv)) return (Number(av) - Number(bv)) * sortDir;
      return String(av).localeCompare(String(bv), 'ru') * sortDir;
    });
  }
  return rows;
}

// ── Рендер ──
function fmt(d) { if (!d) return '—'; try { const [y,m,dd] = String(d).split('-'); return dd+'.'+m+'.'+y; } catch(e) { return d; } }
function fmtMoney(n) { const num = Number(n); if (!num && num !== 0) return '—'; return num.toLocaleString('ru-RU') + ' ₽'; }
function badgeCls(s) { if (s==='Оплачено') return 'badge-paid'; if (s==='Не оплачено') return 'badge-unpaid'; return 'badge-partial'; }

function render() {
  const rows = filtered();
  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="empty">Нет записей</td></tr>';
  } else {
    tbody.innerHTML = rows.map(r => `<tr>
      <td title="${r.client||''}">${r.client||''}</td>
      <td>${r.category||''}</td>
      <td>${r.articleUrl ? `<a class="link-btn" href="${r.articleUrl}" target="_blank">↗ Статья</a>` : '—'}</td>
      <td>${r.taskUrl ? `<a class="link-btn" href="${r.taskUrl}" target="_blank">↗ Задача</a>` : '—'}</td>
      <td>${fmt(r.launch)}</td>
      <td>${fmt(r.payWork)}</td>
      <td>${fmtMoney(r.workAmt)}</td>
      <td>${fmt(r.payBudget)}</td>
      <td>${fmtMoney(r.budgetAmt)}</td>
      <td><span class="badge ${badgeCls(r.status)}">${r.status||''}</span></td>
      <td style="white-space:nowrap">
        <button class="icon-btn" onclick="openModal('${r.id}')" title="Редактировать">✏️</button>
        <button class="icon-btn del" onclick="deleteRow('${r.id}')" title="Удалить">🗑</button>
      </td>
    </tr>`).join('');
  }

  const totalWork = data.reduce((s,r) => s + (Number(r.workAmt)||0), 0);
  const totalBudget = data.reduce((s,r) => s + (Number(r.budgetAmt)||0), 0);
  const paid = data.filter(r => r.status==='Оплачено').length;
  const unpaid = data.filter(r => r.status==='Не оплачено').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Всего клиентов</div><div class="metric-value blue">${data.length}</div></div>
    <div class="metric"><div class="metric-label">Оплачено</div><div class="metric-value green">${paid}</div></div>
    <div class="metric"><div class="metric-label">Не оплачено</div><div class="metric-value amber">${unpaid}</div></div>
    <div class="metric"><div class="metric-label">Сумма работ</div><div class="metric-value">${totalWork.toLocaleString('ru-RU')} ₽</div></div>
    <div class="metric"><div class="metric-label">Сумма бюджетов</div><div class="metric-value amber">${totalBudget.toLocaleString('ru-RU')} ₽</div></div>
  `;
}

// ── Модалка ──
function openModal(id) {
  editId = id || null;
  const row = id ? data.find(r => String(r.id) === String(id)) || {} : {};
  document.getElementById('modal-title').textContent = id ? 'Редактировать запись' : 'Новый клиент';
  document.getElementById('f-client').value = row.client || '';
  document.getElementById('f-category').value = row.category || '';
  document.getElementById('f-status').value = row.status || 'Не оплачено';
  document.getElementById('f-article').value = row.articleUrl || '';
  document.getElementById('f-task').value = row.taskUrl || '';
  document.getElementById('f-launch').value = row.launch || '';
  document.getElementById('f-paywork').value = row.payWork || '';
  document.getElementById('f-workamt').value = row.workAmt || '';
  document.getElementById('f-paybudget').value = row.payBudget || '';
  document.getElementById('f-budgetamt').value = row.budgetAmt || '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-client').focus(), 50);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveRow() {
  const client = document.getElementById('f-client').value.trim();
  if (!client) { alert('Укажите название клиента'); return; }

  const row = {
    id: editId || '',
    client,
    category: document.getElementById('f-category').value.trim(),
    status: document.getElementById('f-status').value,
    articleUrl: document.getElementById('f-article').value.trim(),
    taskUrl: document.getElementById('f-task').value.trim(),
    launch: document.getElementById('f-launch').value,
    payWork: document.getElementById('f-paywork').value,
    workAmt: Number(document.getElementById('f-workamt').value) || 0,
    payBudget: document.getElementById('f-paybudget').value,
    budgetAmt: Number(document.getElementById('f-budgetamt').value) || 0,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Сохранение...';
  setBadge('saving', '⟳ Сохранение...');

  try {
    const result = await api({ action: 'save', row: JSON.stringify(row) });
    closeModal();
    await loadData();
    setBadge('ok', '✓ Сохранено');
  } catch(e) {
    setBadge('error', '⚠ Ошибка сохранения');
    alert('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Сохранить';
  }
}

async function deleteRow(id) {
  if (!confirm('Удалить эту запись?')) return;
  setBadge('saving', '⟳ Удаление...');
  try {
    await api({ action: 'delete', id });
    await loadData();
    setBadge('ok', '✓ Удалено');
  } catch(e) {
    setBadge('error', '⚠ Ошибка удаления');
  }
}

function exportCSV() {
  const headers = ['Клиент','Категория','Статья','Задача','Первый запуск','Дата опл. работы','Сумма работы','Дата опл. бюджета','Сумма бюджета','Статус'];
  const rows = data.map(r => [r.client,r.category,r.articleUrl,r.taskUrl,r.launch,r.payWork,r.workAmt,r.payBudget,r.budgetAmt,r.status]);
  const csv = [headers,...rows].map(r => r.map(v => '"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'payments_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function setBadge(type, text) {
  const b = document.getElementById('save-badge');
  b.textContent = text;
  b.className = 'save-badge' + (type==='saving'?' saving':type==='error'?' error':'');
}
</script>
</body>
</html>
