<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учёт оплат клиентов</title>
    <style>
        body { font-family: sans-serif; font-size: 13px; background: #f4f4f4; padding: 20px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #fafafa; }
        .badge { padding: 4px 8px; border-radius: 10px; font-size: 11px; }
        .badge-ok { background: #e8f5e9; color: #2e7d32; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; background: #4285f4; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>📊 Учёт оплат</h2>
            <div id="status-badge" class="badge">Загрузка...</div>
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn" onclick="openModal()">+ Добавить запись</button>
            <button class="btn" style="background: #eee; color: #333;" onclick="loadData()">↻ Обновить</button>
        </div>

        <table id="main-table">
            <thead>
                <tr>
                    <th>Клиент</th>
                    <th>Название</th>
                    <th>Бюджет</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="5" style="text-align:center;">Поиск данных...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxJtyM1MsIVzCmfBZNm9s9i89TqiXkVAc4bCAI13U95AFu1g5zL0XXtHrXpkogYAx4/exec';
        let data = [];

        async function loadData() {
            const badge = document.getElementById('status-badge');
            badge.textContent = 'Синхронизация...';
            try {
                const response = await fetch(SCRIPT_URL + '?action=getAll', { redirect: 'follow' });
                const result = await response.json();
                data = result.rows || [];
                render();
                badge.textContent = 'Готово';
                badge.className = 'badge badge-ok';
            } catch (e) {
                console.error(e);
                badge.textContent = 'Ошибка связи';
                document.getElementById('tbody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red">Не удалось подключиться к Google Таблице. Проверьте развертывание скрипта.</td></tr>';
            }
        }

        function render() {
            const tbody = document.getElementById('tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Записей пока нет. Нажмите "Добавить", чтобы создать первую.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r['Клиент'] || '—'}</td>
                    <td>${r['Название'] || '—'}</td>
                    <td>${r['Сумма бюджета'] || 0} ₽</td>
                    <td>${r['Статус'] || '—'}</td>
                    <td><button onclick="deleteRow('${r.id}')">🗑</button></td>
                </tr>
            `).join('');
        }

        // Запуск при старте
        loadData();

        function openModal() {
            const client = prompt("Введите название клиента:");
            const title = prompt("Введите название темы:");
            const amount = prompt("Сумма бюджета:");
            if(client) saveRow({ "Клиент": client, "Название": title, "Сумма бюджета": amount, "Статус": "Не оплачено" });
        }

        async function saveRow(row) {
            await fetch(SCRIPT_URL + '?action=save&row=' + encodeURIComponent(JSON.stringify(row)), { redirect: 'follow' });
            loadData();
        }

        async function deleteRow(id) {
            if(confirm('Удалить?')) {
                await fetch(SCRIPT_URL + '?action=delete&id=' + id, { redirect: 'follow' });
                loadData();
            }
        }
    </script>
</body>
</html>
